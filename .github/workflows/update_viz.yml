name: Actualizar Grafico Ecosistema
on:
  schedule:
    - cron: '0 3 2 * *' 
  workflow_dispatch:   

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Actualizado a v4
      - name: Configurar Python
        uses: actions/setup-python@v5 # Actualizado a v5
        with: 
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install pandas matplotlib
      - name: Ejecutar visualizador
        run: python generar_grafico.py
      - name: Guardar cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add grafico_ecosistema_mendoza.png
          git commit -m "Reporte mensual automático" || echo "No hay cambios para commitear"
          git push
