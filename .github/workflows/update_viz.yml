name: Actualizar Grafico Ecosistema
on:
  schedule:
    - cron: '0 3 2 * *' 
  workflow_dispatch:   

permissions:
  contents: write      

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas matplotlib

      - name: Ejecutar visualizador
        # IMPORTANTE: Aquí agregamos 'extractor/' para que encuentre el archivo
        run:
          cd extractor
          python extractor/generar_grafico.py

      - name: Guardar cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add grafico_ecosistema_mendoza.png
          git commit -m "Reporte mensual automático" || echo "Sin cambios"
          git push
